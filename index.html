<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>國中會考倒數</title>
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", "Helvetica Neue", sans-serif;
    background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
    background-attachment: fixed;
    color: #fff;
    min-height: 100vh;
    min-height: 100dvh;
    padding: calc(env(safe-area-inset-top, 0px) + 32px) calc(env(safe-area-inset-right, 0px) + 24px) calc(env(safe-area-inset-bottom, 0px) + 48px) calc(env(safe-area-inset-left, 0px) + 24px);
    -webkit-font-smoothing: antialiased;
  }
  .app { text-align: center; max-width: 680px; width: 100%; margin: 0 auto; }
  .label { font-size: 16px; letter-spacing: 0.25em; opacity: 0.78; margin-bottom: 18px; }
  .countdown { display: flex; align-items: baseline; justify-content: center; gap: 14px; margin-bottom: 14px; }
  .days {
    font-size: clamp(88px, 20vw, 200px); font-weight: 800; line-height: 1.15;
    background: linear-gradient(180deg, #ffffff 0%, #a8c8ff 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    letter-spacing: -0.02em;
    padding: 0.05em 0.08em;
  }
  .unit { font-size: 28px; opacity: 0.9; }
  .target { font-size: 13px; opacity: 0.55; margin-bottom: 32px; }
  .quote {
    font-size: clamp(18px, 4vw, 22px); line-height: 1.85;
    padding: 28px 24px; background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 18px;
    margin-bottom: 24px; font-weight: 500;
  }
  .settings { margin-top: 32px; font-size: 13px; opacity: 0.7; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center; }
  .settings label { opacity: 0.7; }
  .settings input {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; padding: 6px 10px; border-radius: 8px; font-size: 13px; font-family: inherit;
    color-scheme: dark;
  }
  .settings button {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
    color: #fff; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 13px;
  }
  .settings button:hover { background: rgba(255,255,255,0.25); }
  .meta { margin-top: 14px; font-size: 11px; opacity: 0.4; }

  .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 44px 0 32px; }
  .study-section { text-align: left; }
  .study-title { font-size: 14px; opacity: 0.85; margin-bottom: 14px; text-align: center; letter-spacing: 0.3em; }
  .progress-bar-bg { height: 10px; background: rgba(255,255,255,0.08); border-radius: 5px; overflow: hidden; margin: 0 auto 8px; max-width: 480px; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #6dd5ed 0%, #4a90c2 100%); transition: width 0.35s ease; width: 0%; }
  .progress-text { text-align: center; font-size: 12px; opacity: 0.7; margin-bottom: 18px; }
  .subject-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; justify-content: center; }
  .tab { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 6px 12px; border-radius: 16px; cursor: pointer; font-family: inherit; font-size: 12px; opacity: 0.78; }
  .tab.active { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.4); opacity: 1; font-weight: 600; }
  .subject-progress-text { text-align: center; font-size: 11px; opacity: 0.5; margin-bottom: 12px; }
  .unit-list { display: flex; flex-direction: column; gap: 5px; }
  .unit-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; background: rgba(255,255,255,0.04); border-radius: 8px; gap: 12px; transition: background 0.15s; }
  .unit-row:hover { background: rgba(255,255,255,0.07); }
  .unit-name { font-size: 13.5px; flex: 1; line-height: 1.4; cursor: pointer; transition: color 0.15s; user-select: none; }
  .unit-name:hover { color: #6dd5ed; }
  .unit-name:active { color: #4a90c2; }
  .unit-checks { display: flex; gap: 5px; flex-shrink: 0; }
  .check { width: 22px; height: 22px; border-radius: 5px; border: 1.5px solid rgba(255,255,255,0.3); cursor: pointer; transition: all 0.15s; user-select: none; position: relative; }
  .check:hover { border-color: rgba(255,255,255,0.6); }
  .check.checked { background: #6dd5ed; border-color: #6dd5ed; }
  .check.checked::after { content: "✓"; color: #0f2027; font-size: 15px; font-weight: 800; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); line-height: 1; }
  .reset-btn { display: block; margin: 22px auto 0; background: transparent; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.5); padding: 5px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: inherit; }
  .reset-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

  /* 首頁科目卡片 */
  .subject-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-top: 4px;
  }
  .subject-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 22px 16px 18px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    color: inherit;
    font-family: inherit;
  }
  .subject-card:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.28);
    transform: translateY(-2px);
  }
  .subject-card-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.12em;
    margin-bottom: 14px;
  }
  .subject-card-pct {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(180deg, #ffffff 0%, #a8c8ff 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    line-height: 1.15;
    padding: 0.05em 0;
    margin-bottom: 6px;
  }
  .subject-card-count {
    font-size: 11px;
    opacity: 0.5;
    margin-bottom: 10px;
  }
  .subject-card-bar {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .subject-card-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #6dd5ed 0%, #4a90c2 100%);
    transition: width 0.35s ease;
  }
  /* 細節 header */
  .back-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    margin-bottom: 14px;
  }
  .back-btn:hover { background: rgba(255,255,255,0.18); }
  .detail-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
  }
  .detail-title { font-size: 22px; font-weight: 700; letter-spacing: 0.2em; }
  .detail-progress { font-size: 12px; opacity: 0.7; }
  .sub-section { margin-top: 22px; }
  .sub-section:first-child { margin-top: 0; }
  .sub-section-title {
    font-size: 13px; opacity: 0.7;
    padding-bottom: 6px; margin-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    letter-spacing: 0.2em;
  }
  .hidden { display: none !important; }

  /* 制定讀書計劃 */
  .plan-btn {
    display: block;
    margin: 24px auto 0;
    background: linear-gradient(135deg, #6dd5ed 0%, #4a90c2 100%);
    border: none;
    color: #0f2027;
    padding: 12px 26px;
    border-radius: 24px;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.15em;
  }
  .plan-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(109,213,237,0.28);
  }
  .plan-summary {
    text-align: center;
    font-size: 13px;
    opacity: 0.85;
    margin-bottom: 18px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    line-height: 1.7;
  }
  .plan-day {
    padding: 10px 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    margin-bottom: 6px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .plan-day.today {
    background: rgba(109,213,237,0.15);
    border: 1px solid rgba(109,213,237,0.4);
  }
  .plan-day.past { opacity: 0.32; }
  .plan-day-date {
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 700;
    opacity: 0.85;
    min-width: 92px;
    padding-top: 3px;
    letter-spacing: 0.05em;
  }
  .plan-day.today .plan-day-date { color: #6dd5ed; }
  .plan-day-units {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .plan-unit {
    font-size: 11.5px;
    padding: 3px 8px;
    background: rgba(255,255,255,0.07);
    border-radius: 4px;
    line-height: 1.3;
  }
  .plan-day.today .plan-unit { background: rgba(255,255,255,0.16); }
  .plan-day.past.complete .plan-day-date { color: #6dd5ed; }
  .plan-day.past.incomplete .plan-day-date { color: #ff9b6d; }
  .plan-unit.missing {
    background: rgba(255,155,109,0.28) !important;
    color: #ffd1b3;
    text-decoration: line-through;
  }
  .plan-unit.done { opacity: 0.55; }
  .regen-btn {
    display: inline-block;
    margin-top: 10px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    padding: 5px 14px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .regen-btn:hover { background: rgba(255,255,255,0.12); }
  /* 落後警告 */
  .overdue-banner {
    background: rgba(255,180,80,0.16);
    border: 1px solid rgba(255,180,80,0.45);
    color: #ffe2bb;
    padding: 14px 16px;
    border-radius: 12px;
    margin-bottom: 22px;
    font-size: 14px;
    cursor: pointer;
    line-height: 1.6;
    text-align: left;
    transition: background 0.15s;
  }
  .overdue-banner b { color: #ffc985; }
  .overdue-banner .banner-sub { font-size: 12px; opacity: 0.8; }
  .overdue-banner:hover { background: rgba(255,180,80,0.26); }

  /* 課本版本選擇 */
  .home-buttons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 24px; }
  .plan-btn.secondary {
    background: rgba(255,255,255,0.08);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .plan-btn.secondary:hover { background: rgba(255,255,255,0.16); box-shadow: none; }
  .version-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    margin-bottom: 6px;
    gap: 12px;
  }
  .version-subj { font-size: 15px; font-weight: 600; }
  .version-select {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    padding: 7px 10px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    min-width: 160px;
  }
  .version-select option {
    background: #0f2027;
    color: #fff;
  }

  @media (max-width: 520px) {
    .unit-row { flex-direction: column; align-items: flex-start; gap: 8px; padding: 12px; }
    .unit-checks { align-self: flex-end; }
    .check { width: 26px; height: 26px; }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="overdue-banner hidden" id="overdue-banner"></div>
    <div class="label" id="label">距離國中教育會考還有</div>
    <div class="countdown">
      <div class="days" id="days">--</div>
      <div class="unit" id="unit">天</div>
    </div>
    <div class="target" id="target"></div>
    <div class="quote" id="quote">—</div>

    <div class="divider"></div>
    <div class="study-section">
      <div class="study-title">讀書計畫</div>

      <!-- 首頁:5 科卡片 -->
      <div id="subject-grid-view">
        <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
        <div class="progress-text" id="progress-text">總進度 0 / 0</div>
        <div class="subject-grid" id="subject-grid"></div>
        <div class="home-buttons">
          <button class="plan-btn" id="generate-plan-btn">📋 讀書計劃</button>
          <button class="plan-btn secondary" id="version-btn">📚 課本版本</button>
        </div>
      </div>

      <!-- 細節:點科目後 -->
      <div id="subject-detail-view" class="hidden">
        <button class="back-btn" id="back-btn">← 回到全部科目</button>
        <div class="detail-header">
          <div class="detail-title" id="detail-title"></div>
          <div class="detail-progress" id="detail-progress"></div>
        </div>
        <div id="detail-content"></div>
        <button class="reset-btn" id="reset-btn">清除本科勾選</button>
      </div>

      <!-- 課本版本選擇 -->
      <div id="subject-version-view" class="hidden">
        <button class="back-btn" id="version-back-btn">← 回到全部科目</button>
        <div class="detail-header">
          <div class="detail-title">課本版本</div>
        </div>
        <div class="plan-summary">
          每一科可選用康軒/南一/翰林,讀書計劃會用該版本的章節標題。<br>
          標「待補」的版本會自動使用通用版(108 課綱)。<br>
          <span style="opacity:0.6;font-size:11px">⚠️ 切換版本後,該科已勾選的進度會看起來對應到不同單元,建議選定一次就不換。</span>
        </div>
        <div id="version-content"></div>
      </div>

      <!-- 讀書計劃 -->
      <div id="subject-plan-view" class="hidden">
        <button class="back-btn" id="plan-back-btn">← 回到全部科目</button>
        <div class="detail-header">
          <div class="detail-title">讀書計劃</div>
        </div>
        <div class="plan-summary" id="plan-summary"></div>
        <div id="plan-content"></div>
      </div>
    </div>

    <div class="settings">
      <label for="date-input">會考日期</label>
      <input type="date" id="date-input">
      <button id="save-btn">儲存</button>
    </div>
    <div class="meta" id="meta"></div>
  </div>
<script>
const QUOTES = [
  "你已經比昨天的自己更接近終點了。",
  "一頁一頁讀,一題一題寫,未來就在那邊等你。",
  "慢慢來,比較快。",
  "今天的努力,是明天放榜時的底氣。",
  "不必完美,只要前進。",
  "寫錯沒關係,學會就賺到。",
  "你的努力,會考考卷會看見。",
  "累了就休息五分鐘,但不要停下來。",
  "不怕慢,只怕站。",
  "每一個解出來的題目,都是你的盔甲。",
  "你不是一個人在戰鬥。",
  "把不會的變會,就是進步。",
  "焦慮不會幫你拿分,做題會。",
  "今天讀的,明天就是你的。",
  "別小看每一個五分鐘。",
  "進度條只能自己拉。",
  "看不懂沒關係,再看一次。",
  "你撐到現在已經很厲害了。",
  "想哭就哭,哭完繼續寫。",
  "別跟別人比,跟昨天的自己比。",
  "慢慢讀進去的東西最扎實。",
  "累的時候,看看離終點還有多遠。",
  "寫不出來,翻課本不丟臉。",
  "把錯題收集起來,就是你的寶藏。",
  "一次只專心一件事。",
  "不要邊讀邊滑手機,真的不要。",
  "睡飽再讀,比熬夜有效率。",
  "三餐好好吃,大腦才會轉。",
  "喝水。真的。記得喝水。",
  "緊張是正常的,代表你在乎。",
  "你已經知道的,比你以為的還多。",
  "沒讀完是常態,不用自責。",
  "比起讀新的,複習舊的更划算。",
  "一張紙、一支筆,就是你的全世界。",
  "把目標寫下來,寫在最顯眼的地方。",
  "不會的題目,做記號,等下再回來。",
  "答案卷別忘了畫。",
  "准考證提早準備好。",
  "進考場前深呼吸三次。",
  "你已經練過上千題了,不怕的。",
  "看到題目先笑一下,放鬆。",
  "一個科目寫不好,下一科繼續拚。",
  "不要交白卷,猜也要猜一個。",
  "時間不夠就先寫會的。",
  "寫完檢查兩次,不是一次。",
  "字寫工整一點,分數會給你。",
  "作文先列大綱,再下筆。",
  "數學公式背熟,考試會輕鬆。",
  "英文單字每天背十個。",
  "國文古文多讀幾遍,順了就懂了。",
  "「不經一番寒徹骨,怎得梅花撲鼻香。」——你現在就是在熬那場寒。",
  "「天行健,君子以自強不息。」——今天的你也要自強。",
  "「千里之行,始於足下。」——從這一頁開始。",
  "「業精於勤,荒於嬉。」——勤奮從不會背叛你。",
  "「讀書破萬卷,下筆如有神。」——累積到了,自然就會了。",
  "「鍥而不舍,金石可鏤。」——你也是在雕刻自己。",
  "「寶劍鋒從磨礪出。」——你現在就是那把劍。",
  "「不積跬步,無以至千里。」——一題一題就是跬步。",
  "「莫等閒,白了少年頭,空悲切。」——現在就是你的時刻。",
  "「會當凌絕頂,一覽眾山小。」——撐過去,風景就在那。",
  "「長風破浪會有時。」——你的會,就快來了。",
  "「天生我材必有用。」——包括你寫考卷的這個材。",
  "「黑髮不知勤學早,白首方悔讀書遲。」——現在學最划算。",
  "「書山有路勤為徑。」——勤就是你的路。",
  "「學海無涯苦作舟。」——苦過,你會記得這段。",
  "「少壯不努力,老大徒傷悲。」——不要當老大才哭。",
  "「玉不琢,不成器。」——你正在被琢。",
  "「博觀而約取,厚積而薄發。」——你在厚積。",
  "「行百里者半九十。」——撐到最後一里才是贏家。",
  "「水滴石穿,繩鋸木斷。」——每天一點就有用。",
  "愛因斯坦:「不是我比較聰明,是我陪問題待得比較久。」",
  "居禮夫人:「人不應該被環境征服,而應該征服環境。」",
  "海明威:「優於別人並不高貴,優於過去的自己才是。」",
  "林肯:「給我六小時砍樹,我會花前四小時磨斧。」——磨基本功就是磨斧。",
  "邱吉爾:「永遠、永遠、永遠不要放棄。」",
  "愛迪生:「天才是百分之一靈感,百分之九十九汗水。」",
  "牛頓:「站在巨人的肩膀上。」——課本就是巨人。",
  "達文西:「鐵不用就會生鏽,水不流就會發臭。」",
  "孔子:「學而時習之,不亦說乎。」——複習就是。",
  "孟子:「天將降大任於是人也。」——你也是是人。",
  "老子:「合抱之木,生於毫末。」",

function getTarget() {
  return localStorage.getItem("examDate") || DEFAULT_TARGET;
}
function setTarget(d) {
  localStorage.setItem("examDate", d);
}
function daysUntil(targetStr) {
  const target = new Date(targetStr + "T00:00:00");
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return Math.round((target - today) / 86400000);
}
let _sessionQuote = null;
function getSessionQuote() {
  if (_sessionQuote !== null) return _sessionQuote;
  let seen = [];
  try { seen = JSON.parse(localStorage.getItem("seenQuotes") || "[]"); } catch (e) {}
  if (!Array.isArray(seen)) seen = [];
  // 過濾掉超出範圍的 index(以防 QUOTES 縮減)
  seen = seen.filter(i => Number.isInteger(i) && i >= 0 && i < QUOTES.length);
  if (seen.length >= QUOTES.length) seen = []; // 全部看過 → 重新開始
  const seenSet = new Set(seen);
  const available = [];
  for (let i = 0; i < QUOTES.length; i++) {
    if (!seenSet.has(i)) available.push(i);
  }
  const pick = available[Math.floor(Math.random() * available.length)];
  seen.push(pick);
  localStorage.setItem("seenQuotes", JSON.stringify(seen));
  _sessionQuote = QUOTES[pick];
  return _sessionQuote;
}
function render() {
  const target = getTarget();
  const days = daysUntil(target);
  const $label = document.getElementById("label");
  const $days = document.getElementById("days");
  const $unit = document.getElementById("unit");
  const $target = document.getElementById("target");
  const $quote = document.getElementById("quote");
  const $input = document.getElementById("date-input");
  const $meta = document.getElementById("meta");

  $input.value = target;
  $target.textContent = "目標日期 " + target;

  if (days > 0) {
    $label.textContent = "距離國中教育會考還有";
    $days.textContent = days;
    $unit.textContent = "天";
  } else if (days === 0) {
    $label.textContent = "今天就是會考日";
    $days.textContent = "0";
    $unit.textContent = "天";
  } else {
    $label.textContent = "會考已過";
    $days.textContent = Math.abs(days);
    $unit.textContent = "天";
  }
  $quote.textContent = getSessionQuote();
  $meta.textContent = "已收錄 " + QUOTES.length + " 則語錄,看過會記下來,輪完才會重複";
}

  get: (_, prop) => getUnits(prop),

const DISPLAY_GROUPS = {
  "國語": ["國文"],

function loadProgress() {
  try { return JSON.parse(localStorage.getItem("studyProgress") || "{}"); }
  catch (e) { return {}; }
}
function saveProgress(p) { localStorage.setItem("studyProgress", JSON.stringify(p)); }
let progress = loadProgress();

function getCheck(subj, ui, i) {
  return !!(progress[subj] && progress[subj][ui] && progress[subj][ui][i]);
}
function setCheck(subj, ui, i, v) {
  if (!progress[subj]) progress[subj] = {};
  if (!progress[subj][ui]) progress[subj][ui] = [];
  progress[subj][ui][i] = v;
  saveProgress(progress);
}
function subjectStats(subj) {
  const units = STUDY_PLAN[subj];
  const total = units.length * REVIEW_COUNT;
  let done = 0;
  if (progress[subj]) {
    for (const arr of Object.values(progress[subj])) {
      if (Array.isArray(arr)) done += arr.filter(Boolean).length;
    }
  }
  return { total, done, pct: total ? Math.round(done*100/total) : 0 };
}
function groupStats(group) {
  let total = 0, done = 0;
  for (const subj of DISPLAY_GROUPS[group]) {
    const s = subjectStats(subj);
    total += s.total; done += s.done;
  }
  return { total, done, pct: total ? Math.round(done*100/total) : 0 };
}
function overallStats() {
  let total = 0, done = 0;
  for (const subj of Object.keys(STUDY_PLAN)) {
    const s = subjectStats(subj);
    total += s.total; done += s.done;
  }
  return { total, done, pct: total ? Math.round(done*100/total) : 0 };
}

  $content.innerHTML = "";
  const subjs = DISPLAY_GROUPS[group];
  for (const subj of subjs) {
    const section = document.createElement("div");
    section.className = "sub-section";
    if (subjs.length > 1) {
      const h = document.createElement("div");
      h.className = "sub-section-title";
      const ss = subjectStats(subj);
      h.textContent = subj + "  " + ss.done + "/" + ss.total;
      section.appendChild(h);
    }
    const list = document.createElement("div");
    list.className = "unit-list";
    STUDY_PLAN[subj].forEach((unit, ui) => {
      const row = document.createElement("div");
      row.className = "unit-row";
      const name = document.createElement("div");
      name.className = "unit-name";
      name.textContent = unit;
      name.title = "點一下加 1 次複習";
      name.onclick = () => {
        for (let i = 0; i < REVIEW_COUNT; i++) {
          if (!getCheck(subj, ui, i)) {
            setCheck(subj, ui, i, true);
            renderStudyPlan();
            return;
          }
        }
      };
      row.appendChild(name);
      const checks = document.createElement("div");
      checks.className = "unit-checks";
      const removeOne = () => {
        // 從右往左找第一個已勾選的清掉
        for (let i = REVIEW_COUNT - 1; i >= 0; i--) {
          if (getCheck(subj, ui, i)) {
            setCheck(subj, ui, i, false);
            renderStudyPlan();
            return;
          }
        }
      };
      for (let i = 0; i < REVIEW_COUNT; i++) {
        const checked = getCheck(subj, ui, i);
        const c = document.createElement("div");
        c.className = "check" + (checked ? " checked" : "");
        c.title = "點一下減 1 次複習";
        c.onclick = removeOne;
        checks.appendChild(c);
      }
      row.appendChild(checks);
      list.appendChild(row);
    });
    section.appendChild(list);
    $content.appendChild(section);
  }
}

    const row = document.createElement("div");
    row.className = "version-row";
    const name = document.createElement("div");
    name.className = "version-subj";
    name.textContent = subj;
    row.appendChild(name);
    const sel = document.createElement("select");
    sel.className = "version-select";
    for (const pub of STUDY_PLAN_PUBLISHERS) {
      const opt = document.createElement("option");
      opt.value = pub;
      let label = pub;
      if (pub !== "通用" && !hasPublisherData(pub, subj)) label = pub + "(待補,用通用)";
      opt.textContent = label;
      if ((textbookVersion[subj] || "通用") === pub) opt.selected = true;
      sel.appendChild(opt);
    }
    sel.onchange = () => {
      textbookVersion[subj] = sel.value;
      saveTextbookVersion();
      // 立刻重畫一次,讓「待補」標籤跟著科目選擇即時更新
    };
    row.appendChild(sel);
    $c.appendChild(row);
  }
}

// ---------- 讀書計劃生成、儲存、追蹤 ----------
function loadStudyPlan() {
  try { return JSON.parse(localStorage.getItem("studyPlan") || "null"); } catch (e) { return null; }
}
function saveStudyPlan(p) { localStorage.setItem("studyPlan", JSON.stringify(p)); }
function todayKey() {
  const d = new Date(); d.setHours(0, 0, 0, 0);
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function dateDiff(d1Str, d2Str) {
  const d1 = new Date(d1Str + "T00:00:00");
  const d2 = new Date(d2Str + "T00:00:00");
  return Math.round((d2 - d1) / 86400000);
}
function unitCheckCount(subj, ui) {
  if (!progress[subj] || !progress[subj][ui]) return 0;
  return progress[subj][ui].filter(Boolean).length;
}
function getDayStatus(dayUnits) {
  const missing = [];
  for (const u of dayUnits) {
    if (unitCheckCount(u.subj, u.ui) < u.pass) missing.push(u);
  }
  return { missing, complete: missing.length === 0 };
}

function generateStudyPlan(daysLeft) {
  if (daysLeft <= 0) return null;
  const subjects = Object.keys(STUDY_PLAN);
  const interleaved = [];
  const idx = subjects.map(() => 0);
  let added = true;
  while (added) {
    added = false;
    for (let s = 0; s < subjects.length; s++) {
      const units = STUDY_PLAN[subjects[s]];
      if (idx[s] < units.length) {
        interleaved.push({ subj: subjects[s], ui: idx[s], name: units[idx[s]] });
        idx[s]++;
        added = true;
      }
    }
  }
  const TARGET_PER_DAY = 5;
  let passes = Math.floor(daysLeft * TARGET_PER_DAY / interleaved.length);
  passes = Math.max(1, Math.min(REVIEW_COUNT, passes));
  const allSessions = [];
  for (let p = 0; p < passes; p++) {
    for (const s of interleaved) {
      allSessions.push({ ...s, pass: p + 1 });
    }
  }
  const perDay = Math.ceil(allSessions.length / daysLeft);
  const plan = [];
  for (let d = 0; d < daysLeft; d++) {
    const start = d * perDay;
    if (start >= allSessions.length) { plan.push([]); }
    else { plan.push(allSessions.slice(start, start + perDay)); }
  }
  return { plan, perDay, passes, totalSessions: allSessions.length, unitCount: interleaved.length };
}

function regenerateAndSavePlan() {
  const daysLeft = daysUntil(getTarget());
  if (daysLeft <= 0) return null;
  const res = generateStudyPlan(daysLeft);
  const sp = {
    startDate: todayKey(),
    plan: res.plan,
    perDay: res.perDay,
    passes: res.passes,
    unitCount: res.unitCount,
    totalSessions: res.totalSessions
  };
  saveStudyPlan(sp);
  return sp;
}

function getOverdue() {
  const sp = loadStudyPlan();
  if (!sp) return { totalMissing: 0, daysMissed: 0, todayIdx: -1, sp: null };
  const todayIdx = dateDiff(sp.startDate, todayKey());
  let totalMissing = 0, daysMissed = 0;
  for (let d = 0; d < Math.min(todayIdx, sp.plan.length); d++) {
    const st = getDayStatus(sp.plan[d]);
    if (!st.complete) { daysMissed++; totalMissing += st.missing.length; }
  }
  return { totalMissing, daysMissed, todayIdx, sp };
}

function renderOverdueBanner() {
  const $b = document.getElementById("overdue-banner");
  if (!$b) return;
  const od = getOverdue();
  // 在 plan view 不顯示 banner(已經在計劃裡看得到落後了)
  if (od.totalMissing === 0 || currentView === "plan") {
    $b.classList.add("hidden");
    $b.onclick = null;
    return;
  }
  $b.innerHTML =
    "⚠️ <b>還有 " + od.totalMissing + " 個單元沒補上</b>(累積 " + od.daysMissed + " 天落後)<br>" +
    '<span class="banner-sub">點這裡看計劃,補完再繼續 →</span>';
  $b.classList.remove("hidden");
  $b.onclick = () => {
    currentView = "plan";
    localStorage.setItem("currentView", "plan");
    renderStudyPlan();
    window.scrollTo({ top: 0, behavior: "smooth" });
  };
}

function formatPlanDay(offset) {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + offset);
  const dayNames = ["日","一","二","三","四","五","六"];
  let s = (d.getMonth()+1) + "/" + d.getDate() + " (" + dayNames[d.getDay()] + ")";
  if (offset === 0) s = "今天 " + s;
  else if (offset === 1) s = "明天 " + s;
  else if (offset === -1) s = "昨天 " + s;
  return s;
}

function renderPlan() {
  setView("plan");
  const daysLeft = daysUntil(getTarget());
  const $summary = document.getElementById("plan-summary");
  const $content = document.getElementById("plan-content");
  if (daysLeft <= 0) {
    $summary.textContent = "會考已經結束了!";
    $content.innerHTML = "";
    return;
  }
  let sp = loadStudyPlan();
  if (!sp) sp = regenerateAndSavePlan();
  if (!sp) return;
  const todayIdx = dateDiff(sp.startDate, todayKey());
  $summary.innerHTML =
    "起算日:<b>" + sp.startDate + "</b> · 共 <b>" + sp.plan.length + "</b> 天 · 每天約 <b>" + sp.perDay + "</b> 單元 · 規劃 <b>" + sp.passes + "</b> 輪<br>" +
    '<button class="regen-btn" id="regen-plan-btn">🔄 重新制定計劃</button>';
  $content.innerHTML = "";
  sp.plan.forEach((dayUnits, dayIdx) => {
    if (dayUnits.length === 0) return;
    const row = document.createElement("div");
    let cls = "plan-day";
    let status = null;
    if (dayIdx === todayIdx) cls += " today";
    else if (dayIdx < todayIdx) {
      status = getDayStatus(dayUnits);
      cls += status.complete ? " past complete" : " past incomplete";
    }
    row.className = cls;
    const date = document.createElement("div");
    date.className = "plan-day-date";
    const offset = dayIdx - todayIdx;
    let dateText = formatPlanDay(offset);
    if (status) dateText += status.complete ? "  ✓" : "  ⚠";
    date.textContent = dateText;
    row.appendChild(date);
    const units = document.createElement("div");
    units.className = "plan-day-units";
    for (const u of dayUnits) {
      const tag = document.createElement("span");
      tag.className = "plan-unit";
      if (status) {
        if (unitCheckCount(u.subj, u.ui) < u.pass) tag.classList.add("missing");
        else tag.classList.add("done");
      }
      tag.textContent = u.subj + "·" + u.name + (sp.passes > 1 ? " ⓡ" + u.pass : "");
      units.appendChild(tag);
    }
    row.appendChild(units);
    $content.appendChild(row);
  });
  const $regen = document.getElementById("regen-plan-btn");
  if ($regen) {
    $regen.onclick = () => {
      if (confirm("重新依今天剩餘天數產生新計劃?舊計劃會被覆蓋(已勾選的複習進度不會消失)。")) {
        regenerateAndSavePlan();
        renderStudyPlan();
      }
    };
  }
}

function renderStudyPlan() {
  renderOverdueBanner();
  if (currentView === "plan") {
    renderPlan();
  } else if (currentView === "version") {
    renderVersionPicker();
  } else if (currentView === "home" || !DISPLAY_GROUPS[currentView]) {
    renderHome();
  } else {
    renderDetail(currentView);
  }
}

document.getElementById("version-btn").addEventListener("click", () => {
  currentView = "version";
  localStorage.setItem("currentView", "version");
  renderStudyPlan();
  window.scrollTo({ top: 0, behavior: "smooth" });
});
document.getElementById("version-back-btn").addEventListener("click", () => {
  currentView = "home";
  localStorage.setItem("currentView", "home");
  renderStudyPlan();
  window.scrollTo({ top: 0, behavior: "smooth" });
});
document.getElementById("generate-plan-btn").addEventListener("click", () => {
  currentView = "plan";
  localStorage.setItem("currentView", "plan");
  if (!loadStudyPlan()) regenerateAndSavePlan();
  renderStudyPlan();
  window.scrollTo({ top: 0, behavior: "smooth" });
});
document.getElementById("plan-back-btn").addEventListener("click", () => {
  currentView = "home";
  localStorage.setItem("currentView", "home");
  renderStudyPlan();
  window.scrollTo({ top: 0, behavior: "smooth" });
});
document.getElementById("back-btn").addEventListener("click", () => {
  currentView = "home";
  localStorage.setItem("currentView", "home");
  renderStudyPlan();
  window.scrollTo({ top: 0, behavior: "smooth" });
});
document.getElementById("reset-btn").addEventListener("click", () => {
  if (currentView === "home" || !DISPLAY_GROUPS[currentView]) return;
  if (confirm("確定要清除「" + currentView + "」的所有勾選嗎?")) {
    for (const subj of DISPLAY_GROUPS[currentView]) {
      delete progress[subj];
    }
    saveProgress(progress);
    renderStudyPlan();
  }
});

// 第一次載入時若已過午夜,確保 banner 重算
window.addEventListener("focus", () => { renderStudyPlan(); });

render();
renderStudyPlan();
// 跨日自動更新(放著不關也會切換),順便重算 banner
setInterval(() => { render(); renderStudyPlan(); }, 60 * 1000);
</script>
